services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: fuelphp-app
    ports: ["80:80"]
    volumes:
      - ../:/var/www/html/my_fuel_project
    environment:
      FUEL_ENV: development
      DB_HOST: db
      DB_NAME: fuelphp
      DB_USER: appuser
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks: [fuelphp-network]

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fuelphp
      MYSQL_USER: appuser
      MYSQL_PASSWORD: secret
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports: ["3306:3306"]
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [fuelphp-network]

volumes:
  dbdata:

networks:
  fuelphp-network:
    driver: bridge
